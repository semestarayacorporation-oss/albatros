<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. Albatros Express | Dashboard Operasional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Desain Scrollbar untuk Menu yang Panjang */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #4f46e5; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden">
    
    <div class="flex h-screen w-full relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900 bg-opacity-60 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity cursor-pointer"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-indigo-900 text-white flex flex-col transition-transform duration-300 transform -translate-x-full lg:translate-x-0 lg:static shadow-2xl lg:shadow-none flex-shrink-0">
            
            <div class="p-4 border-b border-indigo-800 flex justify-between items-center bg-indigo-950">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white text-indigo-900 rounded flex items-center justify-center font-black text-lg">AE</div>
                    <div class="flex flex-col">
                        <span class="font-extrabold text-sm tracking-widest uppercase">PT. Albatros</span>
                        <span class="text-[9px] text-indigo-300 uppercase tracking-widest">Core System</span>
                    </div>
                </div>
                <button id="close-sidebar-btn" class="lg:hidden text-indigo-300 hover:text-white p-2 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <nav class="flex-1 p-4 overflow-y-auto custom-scrollbar" id="sidebar-menu">
                </nav>

            <div class="p-4 border-t border-indigo-800 bg-indigo-950">
                <span id="user-display" class="block font-bold text-sm text-indigo-100 mb-2 truncate"></span>
                <button id="logout-btn" class="w-full text-center bg-red-600/20 text-red-400 py-2 rounded border border-red-500/30 hover:bg-red-600 hover:text-white transition text-sm font-bold shadow-sm">Logout / Keluar</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full min-w-0 bg-slate-50 relative z-0">
            
            <header class="bg-white shadow-sm p-4 flex items-center border-b border-gray-200">
                <button id="open-sidebar-btn" class="mr-4 lg:hidden text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 p-2 rounded-md transition focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h2 id="page-title" class="text-lg md:text-xl font-bold text-indigo-900 uppercase tracking-wide truncate">Dashboard</h2>
            </header>

            <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-6">
                </div>
            
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const btnOpen = document.getElementById('open-sidebar-btn');
            const btnClose = document.getElementById('close-sidebar-btn');

            // Fungsi Buka Tutup Sidebar
            const toggleSidebar = () => {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            };

            btnOpen.addEventListener('click', toggleSidebar);
            btnClose.addEventListener('click', toggleSidebar);
            overlay.addEventListener('click', toggleSidebar);

            // Menutup otomatis setelah mengklik menu di Handphone
            document.getElementById('sidebar-menu').addEventListener('click', (e) => {
                if (e.target.tagName === 'A' && window.innerWidth < 1024) {
                    toggleSidebar();
                }
            });
        });
    </script>
    <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
